name: Quantum Sentiment Classifier CI

on:
  push:
    branches:
      - main  # Triggers every time you push to main
  pull_request:
    branches:
      - main  # Runs checks before merging pull requests

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Automatically caches packages to speed up builds

      - name: Install Quantum & ML Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pennylane scikit-learn numpy matplotlib pytest
          fi

      # Runs your pytest suite (e.g., test_classifier.py)
      - name: Run Automated Unit Tests (pytest)
        run: |
          pytest test_classifier.py -v || pytest tests/ -v

      # Verifies the entry points run without breaking syntax
      - name: Verify Classification Script Execution
        run: |
          python3 classify.py "This quantum model pipeline works perfectly!"
          
